<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>实时翻译 · 配置</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
    padding: 24px 20px; color: #242424; background: #fff;
  }
  @media (prefers-color-scheme: dark) { body { color: #eee; background: #1f1f27; } }
  h1 { font-size: 18px; margin: 0 0 10px; }
  p { font-size: 14px; line-height: 1.6; color: inherit; opacity: .8; }
</style>
</head>
<body>
<h1>🎧 会议实时翻译</h1>
<p>把英语发言实时翻译成中文字幕，显示在会议侧边栏。</p>
<p>点击下方「保存」即可添加，无需其他配置。</p>
<script src="https://res.cdn.office.net/teams-js/2.31.1/js/MicrosoftTeams.min.js"></script>
<script>
// Teams requires every configurable tab to ship a config page; ours has
// nothing to configure — just register the content URL and enable Save.
(async () => {
  // Outside Teams (page opened directly, or SDK CDN unreachable) there is
  // nothing to configure — bail quietly instead of throwing.
  if (!window.microsoftTeams || !microsoftTeams.app) return;
  // Derive URLs from wherever this page is hosted, so forks/renames work
  // without editing code (the manifest's validDomains still must match).
  const base = location.origin + location.pathname.replace(/config\.html.*$/, '');
  await microsoftTeams.app.initialize();
  microsoftTeams.pages.config.registerOnSaveHandler((ev) => {
    microsoftTeams.pages.config.setConfig({
      entityId: 'live-translator',
      suggestedDisplayName: '实时翻译',
      contentUrl: base + 'index.html',
      websiteUrl: base + 'index.html',
    }).then(() => ev.notifySuccess()).catch(() => ev.notifyFailure('保存失败，请重试'));
  });
  microsoftTeams.pages.config.setValidityState(true);
})();
</script>
</body>
</html>
