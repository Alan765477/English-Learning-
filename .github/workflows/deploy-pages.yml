name: Deploy to GitHub Pages

# Publishes the static app. After the first run, set
# Settings → Pages → Source = "GitHub Actions".
on:
  push:
    branches:
      - main
      - claude/english-learning-app-tfhro5
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel older runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo root is the static site (no build step needed).
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
